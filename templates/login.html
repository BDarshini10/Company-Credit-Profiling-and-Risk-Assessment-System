<!DOCTYPE html>
<html>
<head>
<title>Login - Credit System</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>
body {
    background: linear-gradient(135deg, #0B3C5D, #1f77b4);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Title */
.system-title {
    text-align: center;
    color: white;
    font-weight: 600;
    margin-bottom: 20px;
}

/* Card */
.login-card {
    width: 380px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    background: white;
}

/* Header */
.login-header {
    text-align: center;
    padding: 20px;
}

.login-header h5 {
    font-weight: 600;
}

/* Button */
.btn-login {
    background: #0B3C5D;
    color: white;
    font-weight: 500;
}

.btn-login:hover {
    background: #062a42;
}
</style>

</head>

<body>

<div>

<!-- SYSTEM TITLE -->
<h4 class="system-title">
    <i class="bi bi-bank"></i> FinTrust Credit Profiling System
</h4>

<!-- LOGIN CARD -->
<div class="login-card">

    <div class="login-header">
        <h5>System Login</h5>
    </div>

    <div class="card-body px-4 pb-4">

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button class="btn btn-login w-100">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </button>

        </form>

        {% if error %}
        <p class="text-danger mt-3 text-center">{{ error }}</p>
        {% endif %}

    </div>

</div>

</div>

</body>
</html>
