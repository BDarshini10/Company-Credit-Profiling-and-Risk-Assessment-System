<!DOCTYPE html>
<html>
<head>
    <title>Company Qualitative Assessment</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="input-page">

<div class="container mt-5 mb-5">

<h3 class="text-center mb-4 fw-semibold">
    Company, Group & Promoter Profiling
</h3>

<form method="POST">

<!-- COMPANY -->
<div class="card mb-4 shadow-sm">
  <div class="card-header">
    <i class="bi bi-building"></i> Company Background
  </div>

  <div class="card-body">

    <input class="form-control mb-3" name="company_name" placeholder="Company Name" required>

    <input class="form-control mb-3" name="website" placeholder="Website URL" required>

    <input class="form-control mb-3" name="industry" placeholder="Industry">

    <input class="form-control mb-3" name="years" placeholder="Years of Operation">

    <textarea class="form-control" name="business_model" rows="3" placeholder="Business Model"></textarea>

  </div>
</div>

<!-- GROUP -->
<div class="card mb-4 shadow-sm">
  <div class="card-header">
    <i class="bi bi-diagram-3"></i> Group Structure
  </div>

  <div class="card-body">

    <input class="form-control mb-3" name="group_companies" placeholder="Number of Group Companies">

    <textarea class="form-control mb-3" name="activities" rows="2" placeholder="Nature of Activities"></textarea>

    <textarea class="form-control" name="exposure" rows="2" placeholder="Inter-company Exposure"></textarea>

  </div>
</div>

<!-- PROMOTER -->
<div class="card mb-4 shadow-sm">
  <div class="card-header bg-secondary text-white">
    <i class="bi bi-person-badge"></i> Promoter Profiling
  </div>

  <div class="card-body">

    <input class="form-control mb-3" name="promoter_name" placeholder="Promoter Name">

    <input class="form-control mb-3" name="education" placeholder="Educational Qualification">

    <textarea class="form-control mb-3" name="experience" rows="2" placeholder="Relevant Experience"></textarea>

    <textarea class="form-control mb-3" name="track_record" rows="2" placeholder="Track Record"></textarea>

    <textarea class="form-control" name="key_functions" rows="2" placeholder="Key Functions"></textarea>

  </div>
</div>

<!-- RISK INPUT -->
<div class="card mb-4 shadow-sm">
  <div class="card-header bg-warning text-dark">
    <i class="bi bi-exclamation-triangle"></i> Promoter Risk Inputs
  </div>

  <div class="card-body">

    <input class="form-control mb-3" name="directorships" placeholder="Number of Directorships">

    <input class="form-control" name="new_entities" placeholder="New Entities Formed (Yes/No)">

  </div>
</div>

<!-- FINANCIAL -->
<div class="card mb-4 shadow-sm">
  <div class="card-header bg-info text-white">
    <i class="bi bi-graph-up"></i> Financial Indicators
  </div>

  <div class="card-body">

    <input class="form-control mb-3" name="profit_margin" placeholder="Profit Margin (%)">

    <input class="form-control" name="debt_ratio" placeholder="Debt Ratio (%)">

  </div>
</div>

<!-- BUTTON -->
<div class="text-center mt-4">
  <button class="btn btn-primary w-40 shadow">
     Proceed to Credit Assessment
  </button>
</div>

</form>

</div>

</body>
</html>
